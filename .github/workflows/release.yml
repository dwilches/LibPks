name: Release

on:
  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  call-build-test-workflow:
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest

    steps:
      - name: Copy libpks build artifacts to dist folder
        run: |
          mkdir -p dist
          cp ./build/src/libpks/liblibpks.a dist/libpks.a
          
          mkdir -p dist/include
          cp src/libpks/include/public/LibPks.h dist/include

          # Push new artifacts to the main branch
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add dist/
          git commit -m "Automatic artifact update ($(date +'%Y-%m-%d'))"
          git push
